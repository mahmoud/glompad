name: Tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  test:
    defaults:
      run:
        working-directory: client
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: client/package-lock.json
    - run: npm ci
    - name: Unit tests
      run: npm test
    - name: Build
      run: npm run build
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    - name: Playwright E2E
      run: npx playwright test --config playwright.dev.config.ts --project chromium
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: client/playwright-report/
        retention-days: 14
